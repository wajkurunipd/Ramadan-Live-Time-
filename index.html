<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panchagarh Ramadan Clock</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f2027">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:15px;
}

h1{
color:#ffd700;
}

.clock{
font-size:42px;
margin:15px 0;
}

.card{
background:#1b1b1b;
margin:10px 0;
padding:15px;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px 18px;
border:none;
border-radius:8px;
background:#ffd700;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>🌙 Ramadan Live Clock</h1>

<div class="clock" id="clock"></div>

<div class="card">

<h3>🌅 Sehri</h3>

<div id="sehri"></div>

</div>

<div class="card">

<h3>🌇 Iftar</h3>

<div id="iftar"></div>

</div>

<button id="installBtn" style="display:none">📲 Install App</button>

</div>

<script>

/* Live Clock */

setInterval(()=>{

document.getElementById("clock").innerHTML=
new Date().toLocaleTimeString('en-US',{hour12:true})

},1000)

/* Prayer Time API */

fetch("https://api.aladhan.com/v1/timingsByCity?city=Panchagarh&country=Bangladesh&method=1")

.then(r=>r.json())

.then(d=>{

let t=d.data.timings

document.getElementById("sehri").innerHTML=t.Fajr

document.getElementById("iftar").innerHTML=t.Maghrib

})

/* Install App */

let deferredPrompt

window.addEventListener('beforeinstallprompt', e=>{

e.preventDefault()

deferredPrompt=e

installBtn.style.display="block"

})

installBtn.addEventListener("click", async ()=>{

deferredPrompt.prompt()

await deferredPrompt.userChoice

deferredPrompt=null

})

/* Service Worker */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")

}

</script>

</body>
</html>
